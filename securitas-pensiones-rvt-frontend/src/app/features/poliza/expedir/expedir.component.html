<div class="expedir-container">
  <h2>Expedir Póliza</h2>

  <form [formGroup]="expedirForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-group">
      <label for="tipoIdentificacion">Tipo Identificación</label>
      <select id="tipoIdentificacion" formControlName="tipoIdentificacion">
        <option value="" disabled>Seleccione...</option>
        <option value="CC">Cédula de Ciudadanía</option>
        <option value="CE">Cédula de Extranjería</option>
        <option value="NIT">NIT</option>
        <option value="PA">Pasaporte</option>
      </select>
    </div>
    <div class="form-group">
      <label for="numeroIdentificacion">Número Identificación</label>
      <input id="numeroIdentificacion" type="text" formControlName="numeroIdentificacion" placeholder="Número" />
    </div>
    <div class="form-group">
      <label for="nombreTomador">Nombre Tomador</label>
      <input id="nombreTomador" type="text" formControlName="nombreTomador" placeholder="Nombre completo" />
    </div>
    <div class="form-group">
      <label for="fechaInicioVigencia">Fecha Inicio Vigencia</label>
      <input id="fechaInicioVigencia" type="date" formControlName="fechaInicioVigencia" />
    </div>
    <div class="form-group">
      <label for="montoRenta">Monto Renta</label>
      <input id="montoRenta" type="number" formControlName="montoRenta" placeholder="0" min="1" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        {{ isLoading() ? 'Expediendo...' : 'Expedir Póliza' }}
      </button>
      <button type="button" class="btn-secondary" (click)="goToMenu()">Volver al Menú</button>
    </div>
  </form>

  @if (createdPoliza(); as p) {
    <div class="alert alert-success" style="margin-top:1rem;">
      Póliza creada: <strong>{{ p.numeroPoliza }}</strong> — Estado: {{ p.estado }}
    </div>
  }

  @if (successMessage(); as msg) { <div class="alert alert-success">{{ msg }}</div> }
  @if (errorMessage(); as msg) { <div class="alert alert-error">{{ msg }}</div> }
</div>
