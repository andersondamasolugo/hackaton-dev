<div class="editar-container">
  <h2>Editar Beneficiario</h2>

  @if (isLoadingData()) {
    <p class="loading-text">Cargando datos del beneficiario...</p>
  }

  <form [formGroup]="editarForm" (ngSubmit)="onSubmit()" class="editar-form" novalidate>
    <div class="form-group">
      <label for="nombreCompleto">Nombre Completo</label>
      <input id="nombreCompleto" type="text" formControlName="nombreCompleto"
             placeholder="Ingrese nombre completo" />
      @if (editarForm.get('nombreCompleto')?.invalid && editarForm.get('nombreCompleto')?.touched) {
        <span class="error-text">Ingrese el nombre completo</span>
      }
    </div>

    <div class="form-group">
      <label for="tipoIdentificacion">Tipo de Identificación</label>
      <select id="tipoIdentificacion" formControlName="tipoIdentificacion">
        <option value="" disabled>Seleccione...</option>
        <option value="CC">Cédula de Ciudadanía</option>
        <option value="CE">Cédula de Extranjería</option>
        <option value="NIT">NIT</option>
        <option value="PA">Pasaporte</option>
      </select>
    </div>

    <div class="form-group">
      <label for="numeroIdentificacion">Número de Identificación</label>
      <input id="numeroIdentificacion" type="text" formControlName="numeroIdentificacion"
             placeholder="Ingrese número de identificación" />
    </div>

    <div class="form-group">
      <label for="parentesco">Parentesco</label>
      <input id="parentesco" type="text" formControlName="parentesco"
             placeholder="Ej: Cónyuge, Hijo, Padre" />
    </div>

    <div class="form-group">
      <label for="porcentajeParticipacion">Porcentaje de Participación</label>
      <input id="porcentajeParticipacion" type="number" formControlName="porcentajeParticipacion"
             placeholder="0 - 100" min="0" max="100" step="1" />
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="isLoading()" class="btn-primary">
        {{ isLoading() ? 'Guardando...' : 'Guardar Cambios' }}
      </button>
      <button type="button" class="btn-secondary" (click)="goBack()">Volver</button>
    </div>
  </form>

  @if (successMessage(); as msg) {
    <div class="alert alert-success">{{ msg }}</div>
  }

  @if (errorMessage(); as msg) {
    <div class="alert alert-error">{{ msg }}</div>
  }
</div>
